<html>
<head>
    <title>Contact me!</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        header {
            background: rgba(255, 255, 255, 0.95);
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            margin-bottom: 30px;
            text-align: center;
        }
        
        header a {
            color: #667eea;
            text-decoration: none;
            margin: 0 15px;
            font-weight: 600;
            font-size: 16px;
            transition: all 0.3s ease;
            border-bottom: 2px solid transparent;
        }
        
        header a:hover {
            color: #764ba2;
            border-bottom: 2px solid #764ba2;
        }
        
        .contact-container {
            max-width: 600px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }
        
        h2 {
            color: #667eea;
            margin-bottom: 30px;
            text-align: center;
            font-size: 32px;
        }
        
        .contact-info {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        
        .info-item {
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 10px;
            color: white;
            transition: transform 0.3s ease;
        }
        
        .info-item:hover {
            transform: translateY(-5px);
        }
        
        .info-label {
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 5px;
            opacity: 0.9;
        }
        
        .info-value {
            font-size: 18px;
            font-weight: 500;
        }
        
        .email-button {
            display: inline-block;
            width: 100%;
            padding: 15px;
            margin-top: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            border-radius: 10px;
            text-align: center;
            font-weight: 600;
            font-size: 16px;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
        }
        
        .email-button:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }
    </style>
</head>

<body>
    <header>    
        <a href="home.html">Home</a>
        <a href="personalExp.html">Personal experience</a>
        <a href="contact.html">Contact me</a>
        <a href="hobby.html">Hobbies</a>
    </header>
    
    <div class="contact-container">
        <h2>Get In Touch</h2>
        
        <div class="contact-info">
            <div class="info-item">
                <div class="info-label">PHONE</div>
                <div class="info-value">+254719534688</div>
            </div>
            
            <div class="info-item">
                <div class="info-label">EMAIL</div>
                <div class="info-value">evelynenganga76@gmail.com</div>
            </div>
        </div>
        
        <a href="mailto:wambulwa6655@gmail.com" class="email-button">Send Email</a>
    </div>
</body>
</html>
